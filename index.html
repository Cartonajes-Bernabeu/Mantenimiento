<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Mantenimiento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1f2e;
      color: #e0e6f0;
      min-height: 100vh;
    }

    /* ── LOGIN ───────────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #141824;
    }

    .login-card {
      background: #1e2438;
      border: 1px solid #2a3045;
      border-radius: 16px;
      padding: 40px 36px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .login-icon { font-size: 2.8rem; margin-bottom: 12px; }

    .login-card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #4A9EFF;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 0.85rem;
      color: #5a6480;
      margin-bottom: 28px;
    }

    .pass-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .pass-wrap input {
      width: 100%;
      padding: 11px 42px 11px 14px;
      background: #141824;
      border: 1px solid #3a4460;
      border-radius: 8px;
      color: #e0e6f0;
      font-size: 1rem;
      transition: border-color 0.15s;
    }

    .pass-wrap input:focus { outline: none; border-color: #4A9EFF; }

    #toggle-pass {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 1rem;
      color: #5a6480;
    }

    #login-error {
      color: #ef5350;
      font-size: 0.82rem;
      min-height: 18px;
      margin-bottom: 10px;
    }

    #btn-login {
      width: 100%;
      padding: 11px;
      background: #4A9EFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-login:hover { background: #2D7DD2; }

    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }
    .shake { animation: shake 0.45s ease; }

    /* ── APP ─────────────────────────────────────────────────────────── */
    #app { display: none; }

    /* Topbar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      background: #141824;
      padding: 0 24px; height: 56px;
      border-bottom: 1px solid #2a3045;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.18rem; font-weight: 700; color: #4A9EFF;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-right label { font-size: 0.85rem; color: #8892a4; }
    .select-hoja {
      background: #232a3e; border: 1px solid #3a4460;
      color: #e0e6f0; padding: 6px 12px;
      border-radius: 6px; font-size: 0.85rem; cursor: pointer;
    }
    .btn-cerrar {
      background: #e53935; color: #fff; border: none;
      padding: 7px 16px; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
    }
    .btn-cerrar:hover { background: #c62828; }

    /* Filtros comunes */
    .filtros-bar {
      display: flex; align-items: flex-end; gap: 24px;
      padding: 14px 24px;
      background: #1e2438; border-bottom: 1px solid #2a3045;
      flex-wrap: wrap;
    }
    .filtro-grupo { display: flex; flex-direction: column; gap: 5px; }
    .filtro-grupo label {
      font-size: 0.73rem; font-weight: 700;
      letter-spacing: 0.05em; color: #8892a4; text-transform: uppercase;
    }
    .filtro-grupo select,
    .filtro-grupo input[type="month"] {
      background: #232a3e; border: 1px solid #3a4460;
      color: #e0e6f0; padding: 8px 12px;
      border-radius: 8px; font-size: 0.88rem;
      min-width: 210px; cursor: pointer;
    }
    .filtro-grupo select:focus,
    .filtro-grupo input[type="month"]:focus { outline: none; border-color: #4A9EFF; }
    .filtro-grupo input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }
    .btn-limpiar {
      background: transparent; border: none; color: #4A9EFF;
      font-size: 0.88rem; cursor: pointer; padding: 8px 4px;
      text-decoration: underline; align-self: flex-end;
    }
    .btn-limpiar:hover { color: #74b8ff; }

    /* Main */
    .main { padding: 20px 24px; }
    .gantt-card {
      background: #1e2438; border-radius: 12px;
      border: 1px solid #2a3045; overflow: hidden;
    }

    /* ── GANTT (barras) ──────────────────────────────────────────────── */
    .gantt-wrapper { overflow-x: auto; padding-bottom: 8px; min-width: 700px; }
    .gantt-cabecera {
      display: flex; align-items: center;
      position: sticky; top: 0;
      background: #1e2438; z-index: 10;
      border-bottom: 1px solid #2a3045;
      padding: 6px 0;
    }
    .gantt-nombre-col { width: 220px; min-width: 220px; flex-shrink: 0; }
    .gantt-barra-col { flex: 1; position: relative; height: 22px; margin-right: 8px; }
    .hora-tick {
      position: absolute; transform: translateX(-50%);
      font-size: 0.7rem; color: #5a6480; user-select: none; top: 4px;
    }
    .gantt-grupo { border-bottom: 1px solid #2a3045; }
    .gantt-fecha-label {
      padding: 7px 12px 3px 12px;
      font-size: 0.73rem; font-weight: 700; color: #4A9EFF;
      letter-spacing: 0.04em; text-transform: uppercase;
      background: #191f30;
    }
    .gantt-fila {
      display: flex; align-items: center;
      min-height: 38px; padding: 3px 0;
      border-top: 1px solid #242b3d;
    }
    .gantt-fila:hover { background: #232a3e88; }
    .gantt-nombre {
      width: 220px; min-width: 220px; flex-shrink: 0;
      padding: 0 10px; font-size: 0.77rem; color: #c0c8d8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 7px;
    }
    .avatar {
      width: 24px; height: 24px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .gantt-barra-wrap { flex: 1; position: relative; height: 28px; margin-right: 8px; }
    .grid-line {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: #2a3045; pointer-events: none;
    }
    .gantt-bloque {
      position: absolute; top: 3px; height: 22px;
      border-radius: 4px; min-width: 2px; cursor: pointer; overflow: hidden;
      display: flex; align-items: center;
      transition: opacity 0.15s, filter 0.15s;
    }
    .gantt-bloque:hover { opacity: 0.85; filter: brightness(1.15); z-index: 5; }
    .bloque-label {
      font-size: 0.64rem; color: rgba(255,255,255,0.9);
      padding: 0 4px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; font-weight: 500; pointer-events: none;
    }
    .empty-msg { text-align: center; color: #5a6480; padding: 48px 24px; font-size: 0.95rem; }

    /* ── GANTT DETALLE ───────────────────────────────────────────────── */
    .gantt-detail-card { padding: 20px 20px 0; }
    .gantt-detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .avatar-lg {
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .gantt-detail-nombre { font-size: 1.05rem; font-weight: 700; color: #e0e6f0; }
    .gantt-detail-fecha { font-size: 0.82rem; color: #8892a4; margin-top: 3px; }
    .gantt-detail-legend { display: flex; align-items: center; font-size: 0.8rem; color: #8892a4; margin-bottom: 4px; }
    .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 5px; }

    /* Slots grid */
    .slots-section { padding: 20px 0 20px; }
    .slots-title { font-size: 0.85rem; font-weight: 700; color: #8892a4; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding: 0 20px; }
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 4px; padding: 0 20px 16px;
    }
    .slot-cell {
      border-radius: 6px; padding: 5px 4px;
      text-align: center; border: 1px solid #2a3045;
    }
    .slot-hora { font-size: 0.65rem; color: #5a6480; margin-bottom: 2px; }
    .slot-estado { font-size: 0.68rem; font-weight: 600; }
    .slot-vacio { background: #191f30; }
    .slot-vacio .slot-estado { color: #3a4460; }
    .slot-trabajo { background: #0d2a4a; border-color: #4A9EFF44; }
    .slot-trabajo .slot-estado { color: #4A9EFF; }
    .slot-parado { background: #2a0d0d; border-color: #ef535044; }
    .slot-parado .slot-estado { color: #ef5350; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1f2e; }
    ::-webkit-scrollbar-thumb { background: #3a4460; border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔧</div>
    <h1>Panel de Mantenimiento</h1>
    <p>Introduce la contraseña para acceder</p>
    <div class="pass-wrap">
      <input type="password" id="input-pass" placeholder="Contraseña" autocomplete="current-password">
      <button id="toggle-pass">👁</button>
    </div>
    <div id="login-error"></div>
    <button id="btn-login">Entrar</button>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">🔧 Panel de Mantenimiento</div>
    <div class="topbar-right">
      <label>Ver Hoja:</label>
      <select class="select-hoja" id="select-hoja">
        <option value="panel">Panel</option>
        <option value="gantt">Gantt</option>
      </select>
      <button class="btn-cerrar" id="btn-cerrar">Cerrar Sesión</button>
    </div>
  </header>

  <!-- Filtros Panel -->
  <section class="filtros-bar" id="filtros-panel">
    <div class="filtro-grupo">
      <label>👷 Operario</label>
      <select id="panel-op"><option value="">Todos los operarios</option></select>
    </div>
    <div class="filtro-grupo">
      <label>📅 Mes de inicio</label>
      <input type="month" id="panel-mes">
    </div>
    <button class="btn-limpiar" id="panel-limpiar">Limpiar filtros</button>
  </section>

  <!-- Filtros Gantt -->
  <section class="filtros-bar" id="filtros-gantt" style="display:none">
    <div class="filtro-grupo">
      <label>👷 Operario</label>
      <select id="gantt-op"><option value="">-- Selecciona un operario --</option></select>
    </div>
    <div class="filtro-grupo">
      <label>📅 Día</label>
      <select id="gantt-dia"><option value="">-- Selecciona un día --</option></select>
    </div>
  </section>

  <!-- Contenido -->
  <main class="main">
    <div class="gantt-card">
      <div id="main-content">
        <p class="empty-msg">Cargando datos…</p>
      </div>
    </div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
