<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Mantenimiento</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1f2e;
      color: #e0e6f0;
      min-height: 100vh;
    }

    /* ── Topbar ───────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #141824;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid #2a3045;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #4A9EFF;
    }

    .topbar-title span { font-size: 1.4rem; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-right label {
      font-size: 0.85rem;
      color: #8892a4;
    }

    select.select-hoja {
      background: #232a3e;
      border: 1px solid #3a4460;
      color: #e0e6f0;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-cerrar {
      background: #e53935;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cerrar:hover { background: #c62828; }

    /* ── Filtros ──────────────────────────────────────────────────────── */
    .filtros {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      padding: 16px 24px;
      background: #1e2438;
      border-bottom: 1px solid #2a3045;
      flex-wrap: wrap;
    }

    .filtro-grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filtro-grupo label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #8892a4;
      text-transform: uppercase;
    }

    .filtro-grupo label span { margin-right: 4px; }

    .filtro-grupo select,
    .filtro-grupo input[type="month"] {
      background: #232a3e;
      border: 1px solid #3a4460;
      color: #e0e6f0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      min-width: 200px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .filtro-grupo select:focus,
    .filtro-grupo input[type="month"]:focus {
      outline: none;
      border-color: #4A9EFF;
    }

    /* Fix month input on dark background */
    .filtro-grupo input[type="month"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.6;
      cursor: pointer;
    }

    .btn-limpiar {
      background: transparent;
      border: none;
      color: #4A9EFF;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 8px 4px;
      text-decoration: underline;
      align-self: flex-end;
    }
    .btn-limpiar:hover { color: #74b8ff; }

    /* ── Main content ─────────────────────────────────────────────────── */
    .main {
      padding: 20px 24px;
    }

    .gantt-card {
      background: #1e2438;
      border-radius: 12px;
      border: 1px solid #2a3045;
      overflow: hidden;
    }

    /* ── Gantt ────────────────────────────────────────────────────────── */
    .gantt-wrapper {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    /* Cabecera de horas */
    .gantt-cabecera {
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      background: #1e2438;
      z-index: 10;
      border-bottom: 1px solid #2a3045;
      padding: 6px 0;
    }

    .gantt-nombre-col {
      width: 220px;
      min-width: 220px;
      flex-shrink: 0;
    }

    .gantt-barra-col {
      flex: 1;
      position: relative;
      height: 22px;
      margin-right: 8px;
    }

    .hora-tick {
      position: absolute;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: #5a6480;
      user-select: none;
      top: 4px;
    }

    /* Grupos por día */
    .gantt-grupo {
      border-bottom: 1px solid #2a3045;
    }

    .gantt-fecha-label {
      padding: 8px 12px 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #4A9EFF;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: #191f30;
    }

    /* Fila de operario */
    .gantt-fila {
      display: flex;
      align-items: center;
      min-height: 38px;
      padding: 3px 0;
      border-top: 1px solid #242b3d;
    }

    .gantt-fila:hover { background: #232a3e88; }

    .gantt-nombre {
      width: 220px;
      min-width: 220px;
      flex-shrink: 0;
      padding: 0 10px;
      font-size: 0.78rem;
      color: #c0c8d8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: 0;
    }

    /* Zona de barras */
    .gantt-barra-wrap {
      flex: 1;
      position: relative;
      height: 28px;
      margin-right: 8px;
    }

    /* Líneas de guía verticales */
    .grid-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: #2a3045;
      pointer-events: none;
    }

    /* Bloques de trabajo */
    .gantt-bloque {
      position: absolute;
      top: 3px;
      height: 22px;
      border-radius: 4px;
      min-width: 2px;
      cursor: pointer;
      overflow: hidden;
      transition: opacity 0.15s, filter 0.15s;
      display: flex;
      align-items: center;
    }

    .gantt-bloque:hover {
      opacity: 0.85;
      filter: brightness(1.15);
      z-index: 5;
    }

    .bloque-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.9);
      padding: 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      pointer-events: none;
    }

    /* Mensaje vacío */
    .empty-msg {
      text-align: center;
      color: #5a6480;
      padding: 48px 24px;
      font-size: 0.95rem;
    }

    /* ── Scrollbar ────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1f2e; }
    ::-webkit-scrollbar-thumb { background: #3a4460; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5475; }
  </style>
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">
      <span>🔧</span> Panel de Mantenimiento
    </div>
    <div class="topbar-right">
      <label>Ver Hoja:</label>
      <select class="select-hoja" id="btn-hoja">
        <option value="gantt">Gantt</option>
      </select>
      <button class="btn-cerrar" id="btn-cerrar">Cerrar Sesión</button>
    </div>
  </header>

  <!-- Filtros -->
  <section class="filtros">
    <div class="filtro-grupo">
      <label><span>👷</span> OPERARIO</label>
      <select id="filtro-operario">
        <option value="">Todos los operarios</option>
      </select>
    </div>
    <div class="filtro-grupo">
      <label><span>📅</span> MES DE INICIO</label>
      <input type="month" id="filtro-mes">
    </div>
    <button class="btn-limpiar" id="btn-limpiar">Limpiar filtros</button>
  </section>

  <!-- Contenido -->
  <main class="main">
    <div class="gantt-card">
      <div id="gantt-container">
        <p class="empty-msg">Cargando datos…</p>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
